<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menu beheren — verplaatst</title>
<meta name="robots" content="noindex">
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#0e1318;color:#e8edf2;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:24px}
  .card{max-width:480px;background:#141b1f;border:1px solid #1e2d3d;border-radius:16px;padding:36px;text-align:center}
  h1{font-family:'Syne',system-ui,sans-serif;font-size:22px;margin:0 0 12px;color:#fff}
  p{color:#94a3b8;font-size:14px;line-height:1.6;margin:0 0 20px}
  .btn{display:inline-block;background:#00c896;color:#000;padding:12px 24px;border-radius:10px;font-weight:700;text-decoration:none;font-size:14px;margin:4px}
  .btn-ghost{background:transparent;color:#94a3b8;border:1px solid #1e2d3d}
  .btn-ghost:hover{color:#fff}
</style>
</head>
<body>
  <div class="card">
    <div style="font-size:42px;margin-bottom:8px">🍽️</div>
    <h1>Menu beheer zit nu in de kassa</h1>
    <p>Om verwarring te voorkomen is menu-beheer verplaatst naar <strong>kassa.html → Menu-tab</strong>. Dat is dezelfde plek waar je bestellingen, tafels en reserveringen beheert.</p>
    <div>
      <a class="btn" href="kassa.html#menu">Open kassa → Menu</a>
      <a class="btn btn-ghost" href="portal.html">Terug naar portaal</a>
    </div>
  </div>
</body>
</html>
