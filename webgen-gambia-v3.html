<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGen Gambia Pro - AI Website Builder for Gambian Businesses</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00c896">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&family=Montserrat:wght@400;500;600&family=Lato:wght@400;600&family=Poppins:wght@400;500;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080c10;
            --bg2: #0e1318;
            --card: #111820;
            --border: #1e2d3d;
            --teal: #00c896;
            --teal2: #00a87e;
            --gold: #f5a200;
            --text: #e8edf2;
            --muted: #6b8099;
            --purple: #8b5cf6;
            --blue: #3b82f6;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--teal);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--teal2);
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background: var(--border);
        }

        .left-panel {
            width: 440px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .right-panel {
            flex: 1;
            background: var(--bg2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            padding: 12px 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
        }

        .top-bar label {
            color: var(--muted);
            white-space: nowrap;
            font-weight: 500;
        }

        .top-bar input,
        .top-bar select {
            flex: 1;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
        }

        .top-bar input:focus,
        .top-bar select:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 2px rgba(0, 200, 150, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: var(--teal);
        }

        .status-dot.loading {
            background: var(--gold);
        }

        .status-dot.disconnected {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 10px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .tab {
            padding: 7px 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.25s ease;
            flex: 1;
            text-align: center;
            min-width: 0;
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .tab.active {
            background: var(--teal);
            color: var(--bg);
            border-color: var(--teal);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Syne', sans-serif;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.25s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(0, 200, 150, 0.1);
            background: var(--bg);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'DM Sans', sans-serif;
        }

        .section-header {
            margin-top: 20px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--teal);
            font-size: 12px;
            font-weight: 700;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Syne', sans-serif;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal) 0%, var(--purple) 100%);
            color: white;
            width: 100%;
            margin-top: 20px;
            font-size: 14px;
            padding: 14px;
            animation: shimmer 2s infinite;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 150, 0.3);
        }

        @keyframes shimmer {
            0%, 100% { box-shadow: 0 0 0 rgba(0, 200, 150, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 200, 150, 0.4); }
        }

        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg2);
            border-color: var(--teal);
            color: var(--teal);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 4px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .toggle.on {
            background: var(--teal);
            border-color: var(--teal);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.25s ease;
        }

        .toggle.on::after {
            left: 22px;
        }

        .section-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: move;
            transition: all 0.2s ease;
        }

        .section-item.dragging {
            opacity: 0.4;
            background: var(--bg);
        }

        .section-item.drag-over {
            border-top: 3px solid #00c896;
            padding-top: 10px;
        }

        .section-item .drag-handle {
            color: var(--muted);
            cursor: grab;
            flex-shrink: 0;
        }

        .section-item .drag-handle:active {
            cursor: grabbing;
        }

        .section-item label {
            flex: 1;
            cursor: pointer;
            font-size: 13px;
            color: var(--text);
            margin: 0;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s ease;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .color-swatch.selected {
            border-color: var(--text);
            box-shadow: 0 0 12px rgba(0, 200, 150, 0.4);
        }

        .font-preview {
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .font-preview:hover {
            border-color: var(--teal);
        }

        .font-preview.selected {
            border-color: var(--teal);
            background: rgba(0, 200, 150, 0.1);
        }

        .font-preview-text {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .font-preview-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .browser-chrome {
            height: 60px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .chrome-dots {
            display: flex;
            gap: 6px;
        }

        .chrome-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .chrome-dot.red { background: #ef4444; }
        .chrome-dot.yellow { background: var(--gold); }
        .chrome-dot.green { background: var(--teal); }

        .url-bar {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--muted);
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .device-toggle {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .device-btn {
            padding: 6px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.25s ease;
        }

        .device-btn.active {
            background: var(--teal);
            color: var(--bg);
            border-color: var(--teal);
        }

        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
            background: var(--bg);
        }

        .preview-container {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            background: white;
        }

        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .export-bar {
            height: 50px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 0 16px;
        }

        .export-btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .export-btn:hover {
            background: var(--teal);
            color: var(--bg);
            border-color: var(--teal);
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            animation: slideIn 0.25s ease;
            max-width: 300px;
        }

        .toast.success {
            border-color: var(--teal);
            background: rgba(0, 200, 150, 0.1);
            color: var(--teal);
        }

        .toast.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--card);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            border: 1px solid var(--border);
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--teal);
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--teal);
            cursor: pointer;
            border: none;
        }

        .service-item,
        .testimonial-item,
        .faq-item {
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .item-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-remove {
            padding: 6px 10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.25s ease;
        }

        .btn-remove:hover {
            background: #dc2626;
        }

        .btn-regenerate {
            padding: 8px 12px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.25s ease;
            width: 100%;
            margin-top: 8px;
        }

        .btn-regenerate:hover {
            background: #7c3aed;
        }

        .mockup-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .mockup {
            aspect-ratio: 4/5;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.25s ease;
            background: var(--card);
        }

        .mockup:hover {
            border-color: var(--teal);
        }

        .mockup.selected {
            border-color: var(--teal);
            box-shadow: 0 0 12px rgba(0, 200, 150, 0.4);
        }

        .mockup-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .mockup-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            justify-content: center;
        }

        .mockup-line {
            height: 2px;
            background: var(--teal);
            border-radius: 1px;
        }

        input[type="checkbox"] {
            accent-color: var(--teal);
            cursor: pointer;
        }

        @media (max-width: 1200px) {
            .left-panel {
                width: 380px;
            }
        }

        /* STYLE TAB V2 */
        .style-section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 20px 0 10px;
        }
        .style-section-label:first-child { margin-top: 0; }

        .template-grid-v2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
        }
        .tpl-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .tpl-card:hover { border-color: rgba(0,200,150,0.4); }
        .tpl-card.selected { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(0,200,150,0.15); }
        .tpl-pill {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .tpl-bars {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-bottom: 8px;
        }
        .tpl-bar {
            height: 5px;
            border-radius: 2px;
        }
        .tpl-name {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }
        .tpl-desc { font-size: 10px; color: var(--muted); }

        /* Color Palette */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .palette-item {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .palette-item:hover { border-color: rgba(0,200,150,0.3); }
        .palette-item.selected { border-color: var(--teal); }
        .palette-colors {
            display: flex;
            gap: 3px;
            margin-bottom: 4px;
        }
        .palette-swatch {
            flex: 1;
            height: 24px;
            border-radius: 3px;
        }
        .palette-label { font-size: 9px; color: var(--muted); }

        /* Font Pairing */
        .font-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .font-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .font-card:hover { border-color: rgba(0,200,150,0.3); background: var(--bg); }
        .font-card.selected { border-color: var(--teal); background: rgba(0,200,150,0.04); }
        .font-card-label { font-size: 9px; color: var(--teal); font-weight: 600; margin-bottom: 4px; }
        .font-card-preview { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 3px; line-height: 1.2; }
        .font-card-desc { font-size: 9px; color: var(--muted); line-height: 1.4; }

        /* Layout Grid */
        .layout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .layout-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }
        .layout-card:hover { border-color: rgba(0,200,150,0.3); }
        .layout-card.selected { border-color: var(--teal); }
        .layout-icon { font-size: 28px; margin-bottom: 6px; display: block; color: var(--muted); }
        .layout-card.selected .layout-icon { color: var(--teal); }
        .layout-label { font-size: 10px; color: var(--muted); }
        .layout-card.selected .layout-label { color: var(--teal); }

        /* Pill Group */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .style-pill {
            font-size: 11px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .style-pill:hover { border-color: rgba(0,200,150,0.3); color: var(--text); }
        .style-pill.selected { background: var(--teal); border-color: var(--teal); color: var(--bg); }

        /* Style Select */
        .style-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: border-color 0.25s ease;
        }
        .style-select:focus { border-color: var(--teal); outline: none; }
    </style>
</head>
<body>
    <a href="portal.html" style="position:fixed;top:16px;right:16px;z-index:9999;background:#00c896;color:#000;padding:10px 18px;border-radius:10px;font-weight:700;text-decoration:none;font-family:system-ui,sans-serif;font-size:14px;box-shadow:0 4px 16px rgba(0,200,150,0.4);transition:transform 0.2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">Inloggen →</a>
    <div class="container">
        <!-- LEFT PANEL -->

    <script>
        let state = {
            formData: {},
            deviceWidth: '100%',
            currentTemplate: 0,
            currentPalette: 0,
            currentFont: 0,
            currentLayout: 'wide',
            currentAnimation: 'fade',
            currentHero: 'classic',
            currentLang: 'en',
            currentBorderRadius: 8,
            isLight: false,
            useAnthropic: false,
            selectedSections: new Set(),
            sectionOrder: []
        };

        // ═══════════ REMOTE PERSISTENCE ═══════════
        const API_BASE = 'https://webgen-gambia.diederikkok123.workers.dev';
        let authToken = localStorage.getItem('webgen-klant-token') || null;
        let clientCode = null;    // resolved via /api/auth/verify
        let lastServerUpdatedAt = null;
        let remoteSaveTimer = null;
        let remoteSaveInFlight = false;

        function setSaveStatus(mode, detail) {
            const el = document.getElementById('wg-save-status');
            if (!el) return;
            const map = {
                'offline':  { bg: 'rgba(107,127,149,0.15)', color: '#94a3b8', text: detail || 'Local only — sign in to save online' },
                'idle':     { bg: 'rgba(16,185,129,0.15)',  color: '#10b981', text: detail || 'Saved' },
                'saving':   { bg: 'rgba(59,130,246,0.15)',  color: '#3b82f6', text: detail || 'Saving…' },
                'error':    { bg: 'rgba(239,68,68,0.15)',   color: '#ef4444', text: detail || 'Save failed — will retry' }
            };
            const m = map[mode] || map.idle;
            el.style.background = m.bg;
            el.style.color = m.color;
            el.textContent = m.text;
        }

        async function resolveAuth() {
            if (!authToken) return false;
            try {
                const r = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
                    body: '{}'
                });
                if (!r.ok) { authToken = null; localStorage.removeItem('webgen-klant-token'); return false; }
                const data = await r.json();
                if (data && data.valid && data.clientCode) {
                    clientCode = data.clientCode;
                    return true;
                }
            } catch (e) { /* offline, fall back to local */ }
            return false;
        }

        async function loadStateRemote() {
            if (!clientCode || !authToken) return false;
            try {
                setSaveStatus('saving', 'Loading…');
                const r = await fetch(`${API_BASE}/api/website/${clientCode}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (!r.ok) { setSaveStatus('error'); return false; }
                const data = await r.json();
                if (data && typeof data === 'object') {
                    lastServerUpdatedAt = data.updatedAt || null;
                    const { updatedAt, updatedBy, ...remoteState } = data;
                    if (Object.keys(remoteState).length > 0) {
                        state = { ...state, ...remoteState };
                        // selectedSections: Set doesn't serialize, reconstruct empty
                        if (!state.selectedSections || !(state.selectedSections instanceof Set)) {
                            state.selectedSections = new Set();
                        }
                    }
                    setSaveStatus('idle', lastServerUpdatedAt ? 'Loaded from cloud' : 'Ready');
                    return true;
                }
                setSaveStatus('idle', 'Ready');
            } catch (e) {
                console.warn('loadStateRemote failed', e);
                setSaveStatus('error', 'Offline — loaded local copy');
            }
            return false;
        }

        async function saveStateRemote() {
            if (!clientCode || !authToken) return;
            if (remoteSaveInFlight) { // queue another save after the current one
                setTimeout(saveStateRemote, 600);
                return;
            }
            remoteSaveInFlight = true;
            setSaveStatus('saving');
            try {
                // Strip Set (non-serializable) before sending
                const payload = { ...state };
                if (payload.selectedSections instanceof Set) payload.selectedSections = Array.from(payload.selectedSections);
                const r = await fetch(`${API_BASE}/api/website/${clientCode}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (r.ok) {
                    const data = await r.json();
                    lastServerUpdatedAt = data.updatedAt || new Date().toISOString();
                    setSaveStatus('idle', 'Saved ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
                } else {
                    setSaveStatus('error');
                }
            } catch (e) {
                console.warn('saveStateRemote failed', e);
                setSaveStatus('error');
            } finally {
                remoteSaveInFlight = false;
            }
        }

        function scheduleRemoteSave() {
            if (!clientCode || !authToken) return;
            if (remoteSaveTimer) clearTimeout(remoteSaveTimer);
            remoteSaveTimer = setTimeout(saveStateRemote, 1500);
        }

        // Hydrate form inputs from state.formData so updatePreview/collectFormData
        // don't overwrite restored cloud data with empty-input defaults.
        function hydrateInputsFromState() {
            if (!state || !state.formData) return;
            Object.entries(state.formData).forEach(([key, value]) => {
                if (value === undefined || value === null) return;
                const el = document.getElementById(key);
                if (!el) return;
                if (el.type === 'checkbox' || el.type === 'radio') {
                    el.checked = !!value;
                } else {
                    el.value = value;
                }
            });
        }

        function loadState() {
            const saved = sessionStorage.getItem('webgenState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Merge, preserving current-session defaults for any missing keys
                    state = { ...state, ...parsed };
                    if (!(state.selectedSections instanceof Set)) {
                        state.selectedSections = new Set(Array.isArray(parsed.selectedSections) ? parsed.selectedSections : []);
                    }
                } catch (e) {
                    console.log('No saved state');
                }
            }
        }

        function saveState() {
            sessionStorage.setItem('webgenState', JSON.stringify(state));
            scheduleRemoteSave();
        }

            state.useAnthropic = !state.useAnthropic;
            document.getElementById('apiToggle').classList.toggle('on');
            document.getElementById('anthropicKeyContainer').style.display = state.useAnthropic ? 'block' : 'none';
            saveState();

        function collectFormData() {
            const data = {
                businessName: document.getElementById('businessName').value || 'My Business',
                tagline: document.getElementById('tagline').value || 'Premium Service',
                aboutText: document.getElementById('aboutText').value || 'Welcome to our business',
                usps: document.getElementById('usps').value || 'Quality, Reliability, Trust',

                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                domain: document.getElementById('domain').value || 'business.gm',
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                hours: document.getElementById('hours').value || 'Open daily',
                facebook: document.getElementById('facebook').value,
                instagram: document.getElementById('instagram').value,
                tiktok: document.getElementById('tiktok').value,
                linkedin: document.getElementById('linkedin').value,
                heroUrl: document.getElementById('heroUrl').value || 'https://picsum.photos/1200/600?random=1',
                heroHeadline: document.getElementById('heroHeadline')?.value || document.getElementById('businessName')?.value || 'Welcome',
                heroSubtitle: document.getElementById('heroSubtitle')?.value || document.getElementById('tagline')?.value || 'Experience excellence',
                ctaText: document.getElementById('ctaText')?.value || 'Contact Us',
                footerTagline: document.getElementById('footerTagline')?.value || 'Made with love in Gambia'
            };

            data.services = [];
            document.querySelectorAll('.service-item').forEach((item, idx) => {
                const name = item.querySelector(`#service${idx}Name`)?.value;
                const desc = item.querySelector(`#service${idx}Desc`)?.value;
                if (name) data.services.push({ name, description: desc || '' });
            });

            data.testimonials = [];
            document.querySelectorAll('.testimonial-item').forEach((item, idx) => {
                const quote = item.querySelector(`#testimonial${idx}Quote`)?.value;
                const author = item.querySelector(`#testimonial${idx}Author`)?.value;
                const business = item.querySelector(`#testimonial${idx}Business`)?.value;
                if (quote) data.testimonials.push({ quote, author: author || 'Customer', business: business || '' });
            });

            data.faq = [];
            document.querySelectorAll('.faq-item').forEach((item, idx) => {
                const question = item.querySelector(`#faq${idx}Question`)?.value;
                const answer = item.querySelector(`#faq${idx}Answer`)?.value;
                if (question) data.faq.push({ question, answer: answer || '' });

            data.gallery = [];

            try {
                const data = collectFormData();
                const prompt = `Generate compelling website content for this Gambian business in JSON: Name: ${data.businessName}, Sector: ${document.getElementById('sector').value}, Location: ${data.city}. Return: {heroHeadline, heroSubtitle, services: [{name, description}], testimonials: [{quote, author, business}], faq: [{question, answer}], footerTagline}`;

                let response;
                if (state.useAnthropic) {
                    const apiKey = document.getElementById('anthropicKey').value;
                    if (!apiKey) {
                        showToast('Please enter your Anthropic API key', 'error');
                        return;
                    }

                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'content-type': 'application/json',
                            'anthropic-dangerous-direct-browser-access': 'true'
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1024,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });

                    if (!res.ok) throw new Error('Anthropic API error');
                    const json = await res.json();
                    response = json.content[0].text;
                } else {
                    const ollamaUrl = document.getElementById('ollamaUrl').value;
                    const model = document.getElementById('modelSelect').value;

                    if (!model) {
                        showToast('Please connect to Ollama and select a model', 'error');
                        return;
                    }

                    const res = await fetch(`${ollamaUrl}/api/generate`, {
                        method: 'POST',
                        body: JSON.stringify({ model, prompt, stream: false })
                    });

                    if (!res.ok) throw new Error('Ollama error');
                    const json = await res.json();
                    response = json.response;
                }

                const jsonMatch = response.match(/\{[\s\S]*\}/);
                const content = jsonMatch ? JSON.parse(jsonMatch[0]) : {};

                if (content.heroHeadline) document.getElementById('heroHeadline').value = content.heroHeadline;
                if (content.heroSubtitle) document.getElementById('heroSubtitle').value = content.heroSubtitle;
                if (content.footerTagline) document.getElementById('footerTagline').value = content.footerTagline;

                if (content.services && Array.isArray(content.services)) {
                    const list = document.getElementById('servicesList');
                    list.innerHTML = '';
                    content.services.forEach((s, i) => {
                        const item = document.createElement('div');
                        item.className = 'service-item';
                        item.innerHTML = `<input type="text" placeholder="Service Name" id="service${i}Name" value="${s.name || ''}" oninput="updatePreview()" style="width: 100%; padding: 8px; margin-bottom: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px;"><textarea placeholder="Description" id="service${i}Desc" oninput="updatePreview()" style="width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; min-height: 60px;">${s.description || ''}</textarea><div class="item-controls"><button class="btn-remove" onclick="removeService(${i})">Remove</button></div>`;
                        list.appendChild(item);
                    });
                }

                showToast('Content generated successfully!', 'success');
                updatePreview();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            } finally {
                generateBtn.innerHTML = originalText;
                generateBtn.disabled = false;
            }

        function initSectionsList() {
            const list = document.getElementById('sectionsList');
            list.innerHTML = sections.map((s) => `<div class="section-item" draggable="${!s.disabled}" data-section-id="${s.id}" style="user-select: none;"><span class="drag-handle" style="${s.disabled ? 'visibility: hidden;' : ''}">⋮⋮</span><label style="display: flex; align-items: center; gap: 8px; flex: 1; margin: 0;"><input type="checkbox" class="section-toggle" data-section="${s.id}" ${s.default ? 'checked' : ''} ${s.disabled ? 'disabled' : ''}>${s.name}</label>${s.disabled ? '<span style="color: var(--muted); font-size: 11px;">(required)</span>' : ''}<div class="toggle ${s.default ? 'on' : ''}" data-target="${s.id}" style="margin-left: auto; ${s.disabled ? 'opacity:0.4;cursor:not-allowed;pointer-events:none' : 'cursor:pointer'}"></div></div>`).join('');

            // Add drag & drop event listeners
            document.querySelectorAll('.section-item[draggable="true"]').forEach(item => {
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
                item.addEventListener('dragleave', handleDragLeave);
                item.addEventListener('dragend', handleDragEnd);
            });

            document.querySelectorAll('.section-toggle').forEach(cb => {
                cb.onchange = function() {
                    const toggle = this.closest('.section-item').querySelector('.toggle');
                    if (this.checked) toggle.classList.add('on');
                    else toggle.classList.remove('on');
                    updateSections();
                };
            });

            // Clicking the visual toggle pill flips the linked checkbox
            document.querySelectorAll('#sectionsList .toggle[data-target]').forEach(toggle => {
                toggle.onclick = function(e) {
                    e.stopPropagation();
                    const cb = this.closest('.section-item').querySelector('.section-toggle');
                    if (!cb || cb.disabled) return;
                    cb.checked = !cb.checked;
                    cb.dispatchEvent(new Event('change', { bubbles: true }));
                };
            });
        }

        let draggedElement = null;

        function handleDragStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';

            if (this !== draggedElement) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();

            if (this !== draggedElement) {
                // Reorder the sections array
                const draggedIndex = Array.from(draggedElement.parentNode.children).indexOf(draggedElement);
                const targetIndex = Array.from(this.parentNode.children).indexOf(this);

                // Get the section IDs
                const draggedId = draggedElement.dataset.sectionId;
                const targetId = this.dataset.sectionId;

                // Find indices in sections array
                const draggedSectionIndex = sections.findIndex(s => s.id === draggedId);
                const targetSectionIndex = sections.findIndex(s => s.id === targetId);

                // Reorder the sections array
                const [removed] = sections.splice(draggedSectionIndex, 1);
                sections.splice(targetSectionIndex, 0, removed);

                // Save the new order
                saveSectionOrder();

                // Re-render the list
                initSectionsList();

                // Update preview to reflect new order
                updatePreview();
            }

            this.classList.remove('drag-over');
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.section-item').forEach(item => {
                item.classList.remove('drag-over');
            });
        }

        function saveSectionOrder() {
            state.sectionOrder = sections.map(s => s.id);
            saveState();
        }

        function restoreSectionOrder() {
            if (state.sectionOrder && Array.isArray(state.sectionOrder)) {
                const sectionMap = {};
                sections.forEach(s => sectionMap[s.id] = s);

                const orderedSections = [];
                state.sectionOrder.forEach(id => {
                    if (sectionMap[id]) {
                        orderedSections.push(sectionMap[id]);
                    }
                });

                // Add any new sections that aren't in saved order
                sections.forEach(s => {
                    if (!orderedSections.find(os => os.id === s.id)) {
                        orderedSections.push(s);
                    }
                });

                sections.length = 0;
                sections.push(...orderedSections);
            }
        }

            { label: 'Minimal', name: 'Clean Precision', desc: 'Swiss precision. Every pixel intentional.', heading: 'Inter', body: 'Inter' },
            { label: 'Display', name: 'DISPLAY BOLD', desc: 'Open, highly readable body at any size.', heading: 'Oswald', body: 'Source Sans Pro' },
            { label: 'Luxury', name: 'Exquisite', desc: 'Crisp modern body that complements.', heading: 'Cormorant Garamond', body: 'Lato' }
        ];

        // Layout / animation / language options for the Style tab
        const LAYOUTS = [
            { id: 'wide',       label: 'Wide',       icon: '▭' },
            { id: 'narrow',     label: 'Narrow',     icon: '▯' },
            { id: 'centered',   label: 'Centered',   icon: '▮' },
            { id: 'split',      label: 'Split',      icon: '▥' },
            { id: 'sidebar',    label: 'Sidebar',    icon: '▦' },
            { id: 'fullscreen', label: 'Fullscreen', icon: '▢' }
        ];

        const ANIMATIONS = [
            { id: 'none',   label: 'None' },
            { id: 'fade',   label: 'Fade in' },
            { id: 'rise',   label: 'Rise up' },
            { id: 'slide',  label: 'Slide left' },
            { id: 'scale',  label: 'Scale in' },
            { id: 'blur',   label: 'Blur sharpen' }
        ];

        const LANGUAGES = [
            { id: 'en', label: 'English' },
            { id: 'nl', label: 'Nederlands' },
            { id: 'fr', label: 'Français' },
            { id: 'wo', label: 'Wolof' },
            { id: 'mnk', label: 'Mandinka' }
        ];

        // Helpers used by generatePreviewHTML
        function hexToRgb(hex) {
            const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '');
            if (!m) return { r: 0, g: 200, b: 150 };
            return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
        }

        function themeCSS(tplId, isLight, primary, accent) {
            const T = {
                sunset: `body{background:${isLight?'#fdf6ee':'#1a120b'}}header{background:${isLight?'rgba(253,246,238,0.9)':'rgba(26,18,11,0.85)'};border-bottom:2px solid ${primary}}.service-card,.testimonial-card,.faq-question,.contact-section{background:${isLight?'#fff':'#241810'};border:1px solid ${primary}33}.usp-badge{background:transparent;color:${primary};border:1.5px solid ${primary}}section h2::after{content:'';display:block;width:60px;height:3px;background:${primary};margin:14px auto 0;border-radius:2px}`,
                beach:  `body{background:${isLight?'#f4f7f8':'#0a1620'}}header{background:${isLight?'rgba(255,255,255,0.92)':'rgba(10,22,32,0.88)'};backdrop-filter:blur(12px)}.hero{box-shadow:inset 0 -120px 100px -60px ${isLight?'#f4f7f8':'#0a1620'}}.service-card{background:${isLight?'#fff':'rgba(255,255,255,0.04)'};border-radius:24px;border:none;box-shadow:0 8px 30px rgba(0,0,0,${isLight?'0.06':'0.35'})}.usp-badge{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.3)}`,
                ocean:  `body{background:${isLight?'#f8fafc':'#0b1221'}}header{background:transparent;position:absolute;border:none;box-shadow:none}.hero{padding-top:140px}.hero h1{text-shadow:0 2px 30px rgba(0,0,0,0.4)}.service-card{background:linear-gradient(135deg,${isLight?'#fff,#f1f5f9':'rgba(255,255,255,0.04),rgba(255,255,255,0.01)'});border:1px solid ${isLight?'#e2e8f0':'rgba(255,255,255,0.08)'};backdrop-filter:blur(20px)}.contact-section{background:linear-gradient(135deg,${primary}15,${accent}10);border:1px solid ${primary}30}`,
                mosque: `body{background:${isLight?'#faf9f6':'#0f1419'}}.container{max-width:980px}header{border-bottom:none;box-shadow:none;background:transparent;padding:24px 0}section{padding:100px 20px}section h2{font-weight:400;letter-spacing:.02em;position:relative;padding-bottom:24px}section h2::after{content:'◆';display:block;color:${primary};font-size:14px;margin-top:14px}.service-card,.contact-section{background:transparent;border:1px solid ${primary}33;border-radius:0}.usp-badge{background:transparent;color:${primary};border-bottom:1px solid ${primary};border-radius:0;padding:6px 0}`,
                market: `body{background:${isLight?'#fff8e1':'#1a1408'}}header{background:${isLight?'#fff':'#241a0c'};border-bottom:3px dashed ${primary}}.service-card{background:${isLight?'#fff':'#241a0c'};border:none;border-top:5px solid ${primary};border-radius:4px;box-shadow:6px 6px 0 ${accent}}.usp-badge{background:${primary};color:#fff;transform:rotate(-2deg);box-shadow:3px 3px 0 ${accent};border-radius:4px}.usp-badge:nth-child(2n){transform:rotate(1.5deg);background:${accent}}section h2{transform:rotate(-1deg);display:inline-block;width:auto;background:${primary};color:#fff;padding:8px 24px;border-radius:4px}.section{text-align:center}`,
                editorial: `body{background:${isLight?'#fafaf7':'#111'}}.container{max-width:880px}header{border-bottom:1px solid ${isLight?'#222':'#fff'}33;background:transparent}.hero h1{font-size:clamp(56px,9vw,120px);letter-spacing:-0.04em;line-height:0.92;font-weight:800}.hero p{font-style:italic;border-left:3px solid ${primary};padding-left:18px;max-width:500px;margin:0 0 30px;text-align:left}section h2{text-align:left;font-size:48px;letter-spacing:-0.02em;border-bottom:1px solid ${isLight?'#222':'#fff'}22;padding-bottom:18px;margin-bottom:48px}.service-card{background:transparent;border:none;border-top:1px solid ${isLight?'#222':'#fff'}22;text-align:left;padding:30px 0;border-radius:0}.service-card h3{font-size:28px;color:${isLight?'#111':'#fff'}}.usp-badge{background:transparent;color:${primary};padding:0;border:none;font-style:italic;font-weight:400}`,
                tech:   `body{background:${isLight?'#f4f6fb':'#0a0e1a'};background-image:radial-gradient(ellipse at top,${primary}15 0%,transparent 50%)}header{background:${isLight?'rgba(244,246,251,0.8)':'rgba(10,14,26,0.8)'};backdrop-filter:blur(16px);border-bottom:1px solid ${primary}30}.hero{background-image:linear-gradient(135deg,${primary}25 0%,${accent}10 50%,transparent 100%),url('${''}')!important;background-size:cover}.service-card{background:linear-gradient(135deg,${isLight?'#fff':'rgba(255,255,255,0.03)'},${isLight?'#f4f6fb':'rgba(255,255,255,0.01)'});border:1px solid ${primary}40;box-shadow:0 0 30px ${primary}10}.service-card:hover{box-shadow:0 0 50px ${primary}40;border-color:${primary}}.usp-badge{background:transparent;color:${primary};border:1px solid ${primary};box-shadow:0 0 20px ${primary}30}`,
                energy: `body{background:#000;color:#fff!important}header{background:#000;border-bottom:2px solid ${primary}}.hero h1{font-size:clamp(64px,10vw,140px)!important;letter-spacing:-0.03em;line-height:0.9;font-weight:800;text-transform:uppercase}.hero-cta{background:${primary}!important;color:#fff!important;border-radius:0!important;padding:18px 42px!important;font-size:18px!important;text-transform:uppercase;letter-spacing:.1em;border:2px solid ${primary}}.service-card{background:#0a0a0a;border:2px solid ${primary};border-radius:0;text-align:left}.service-card h3{text-transform:uppercase;letter-spacing:.05em}.usp-badge{background:#fff;color:#000;border-radius:0;text-transform:uppercase;letter-spacing:.08em}section h2{text-transform:uppercase;letter-spacing:-0.02em;font-size:48px}`,
                nature: `body{background:${isLight?'#f5f1e8':'#1a1f15'}}header{background:${isLight?'#f5f1e8':'#1a1f15'};border-bottom:none;box-shadow:none}.hero{border-radius:0 0 60% 60% / 0 0 80px 80px;overflow:hidden}.service-card{background:${isLight?'#fff':'#222a1d'};border-radius:24px;border:none;text-align:left;box-shadow:0 4px 20px rgba(0,0,0,${isLight?'0.05':'0.3'})}.usp-badge{background:transparent;color:${primary};border:1.5px solid ${primary};border-radius:24px}.contact-section{background:${primary}15;border:none;border-radius:32px}`,
                ngo:    `body{background:${isLight?'#fff':'#0f172a'}}header{background:${isLight?'#fff':'#0f172a'};border-bottom:1px solid ${primary}30}.hero{background-image:linear-gradient(135deg,${primary}f0,${accent}d0),url('')!important}.service-card{background:${isLight?'#f8fafc':'rgba(255,255,255,0.03)'};border:none;border-left:4px solid ${primary};border-radius:8px;text-align:left}.service-card h3{color:${isLight?'#0f172a':'#fff'}}.usp-badge{background:${primary}15;color:${primary};border:none}.testimonial-card{border-left-width:6px}section h2::before{content:'';display:block;width:40px;height:3px;background:${primary};margin:0 auto 20px}`,
                clinic: `body{background:${isLight?'#f5f9fc':'#0a1422'}}header{background:${isLight?'#fff':'#0f1c30'};border-bottom:1px solid ${isLight?'#e2e8f0':'rgba(255,255,255,0.08)'};box-shadow:0 1px 0 rgba(0,0,0,0.04)}.service-card{background:${isLight?'#fff':'#0f1c30'};border:1px solid ${isLight?'#e2e8f0':'rgba(255,255,255,0.06)'};border-radius:16px;text-align:left;padding:28px}.service-card h3{display:flex;align-items:center;gap:10px}.service-card h3::before{content:'+';color:${primary};font-size:28px;line-height:1}.usp-badge{background:${primary}10;color:${primary};border:1px solid ${primary}30;border-radius:6px;font-weight:500}.contact-section{background:${primary}08;border:1px solid ${primary}25}`,
                school: `body{background:${isLight?'#fff':'#0c1424'}}header{background:${primary};color:#fff;border-bottom:4px solid ${accent}}header .logo{color:#fff}header nav a{color:#fff}.hero{background-image:linear-gradient(135deg,${primary}cc,${primary}88),url('')!important}.service-card{background:${isLight?'#f8fafc':'#162032'};border:none;border-top:4px solid ${primary};border-radius:0 0 12px 12px;text-align:center}.usp-badge{background:${accent};color:#000;border-radius:4px;font-weight:700}section h2{display:inline-block;background:${primary};color:#fff;padding:8px 24px;border-radius:6px}.section{text-align:center}`
            };
            return T[tplId] || '';
        }

        function animationCSS(id) {
            switch (id) {
                case 'fade':  return `.anim-on-scroll{opacity:0;transition:opacity .7s ease}.anim-on-scroll.in-view{opacity:1}`;
                case 'rise':  return `.anim-on-scroll{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}.anim-on-scroll.in-view{opacity:1;transform:none}`;
                case 'slide': return `.anim-on-scroll{opacity:0;transform:translateX(-40px);transition:opacity .7s ease,transform .7s ease}.anim-on-scroll.in-view{opacity:1;transform:none}`;
                case 'scale': return `.anim-on-scroll{opacity:0;transform:scale(.96);transition:opacity .7s ease,transform .7s ease}.anim-on-scroll.in-view{opacity:1;transform:none}`;
                case 'blur':  return `.anim-on-scroll{opacity:0;filter:blur(6px);transition:opacity .7s ease,filter .7s ease}.anim-on-scroll.in-view{opacity:1;filter:none}`;
                default:      return '';
            }
        }

        function initStyleTab() {
            // Templates — grouped by category
            const tplEl = document.getElementById('templateGridV2');
            if (tplEl) {
                let html = '';
                TEMPLATE_CATEGORIES.forEach(cat => {
                    const entries = TEMPLATES_V2.map((t, i) => ({ t, i })).filter(x => x.t.category === cat);
                    if (!entries.length) return;
                    html += `<div class="tpl-category-header" style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 2px;padding-top:4px;border-top:1px solid var(--border)">${cat}</div>`;
                    html += entries.map(({ t, i }) => `
                        <div class="tpl-card${i === state.currentTemplate ? ' selected' : ''}" data-i="${i}" onclick="selectTemplate(${i})" title="${t.desc}">
                            ${t.pill ? `<span class="tpl-pill" style="background:${t.pillBg};color:${t.pillColor}">${t.pill}</span>` : ''}
                            <div class="tpl-bars">${t.bars.map(c => `<div class="tpl-bar" style="background:${c}"></div>`).join('')}</div>
                            <div class="tpl-name">${t.name}</div>
                            <div class="tpl-desc">${t.desc}</div>
                        </div>`).join('');
                });
                tplEl.innerHTML = html;
                // First header shouldn't have a top separator
                const firstHeader = tplEl.querySelector('.tpl-category-header');
                if (firstHeader) { firstHeader.style.borderTop = 'none'; firstHeader.style.marginTop = '0'; firstHeader.style.paddingTop = '0'; }
            }

            // Palettes
            const palEl = document.getElementById('paletteGrid');
            if (palEl) {
                palEl.innerHTML = PALETTES.map((p, i) => `
                    <div class="palette-item${i === state.currentPalette ? ' selected' : ''}" data-i="${i}" onclick="selectPalette(${i})">
                        <div class="palette-colors">${p.colors.map(c => `<div class="palette-swatch" style="background:${c}"></div>`).join('')}</div>
                        <div class="palette-label">${p.name}</div>
                    </div>`).join('');
            }

            // Fonts
            const fontEl = document.getElementById('fontGrid');
            if (fontEl) {
                fontEl.innerHTML = FONTS.map((f, i) => `
                    <div class="font-card${i === state.currentFont ? ' selected' : ''}" data-i="${i}" onclick="selectFont(${i})">
                        <div class="font-card-label">${f.label.toUpperCase()}</div>
                        <div class="font-card-preview" style="font-family:'${f.heading}',sans-serif">${f.name}</div>
                        <div class="font-card-desc" style="font-family:'${f.body}',sans-serif">${f.desc}</div>
                    </div>`).join('');
            }

            // Layouts
            const layoutEl = document.getElementById('layoutGrid');
            if (layoutEl) {
                layoutEl.innerHTML = LAYOUTS.map(l => `
                    <div class="layout-card${l.id === state.currentLayout ? ' selected' : ''}" data-id="${l.id}" onclick="selectLayout('${l.id}')">
                        <span class="layout-icon">${l.icon}</span>
                        <div class="layout-label">${l.label}</div>
                    </div>`).join('');
            }

            // Animations
            const animEl = document.getElementById('animationPills');
            if (animEl) {
                animEl.innerHTML = ANIMATIONS.map(a => `
                    <button class="style-pill${a.id === state.currentAnimation ? ' selected' : ''}" data-id="${a.id}" onclick="selectAnimation('${a.id}')">${a.label}</button>`).join('');
            }

            // Languages
            const langEl = document.getElementById('langPills');
            if (langEl) {
                langEl.innerHTML = LANGUAGES.map(l => `
                    <button class="style-pill${l.id === state.currentLang ? ' selected' : ''}" data-id="${l.id}" onclick="selectLang('${l.id}')">${l.label}</button>`).join('');
            }

            // Border radius select
            const radiusEl = document.getElementById('borderRadiusSelect');
            if (radiusEl) {
                radiusEl.value = String(state.currentBorderRadius ?? 8);
                radiusEl.onchange = () => { state.currentBorderRadius = +radiusEl.value; saveState(); updatePreview(); };
            }

            // Theme toggle reflects state
            const themeEl = document.getElementById('themeToggle');
            if (themeEl) themeEl.classList.toggle('on', !!state.isLight);
        }

        function selectTemplate(i) {
            const tpl = TEMPLATES_V2[i];
            if (!tpl) return;
            state.currentTemplate = i;

            // Apply palette, font, layout, animation, hero style from the template preset
            if (Number.isInteger(tpl.palette) && PALETTES[tpl.palette]) state.currentPalette = tpl.palette;
            if (Number.isInteger(tpl.font) && FONTS[tpl.font]) state.currentFont = tpl.font;
            if (tpl.layout && LAYOUTS.find(l => l.id === tpl.layout)) state.currentLayout = tpl.layout;
            if (tpl.animation && ANIMATIONS.find(a => a.id === tpl.animation)) state.currentAnimation = tpl.animation;
            if (tpl.hero) state.currentHero = tpl.hero;

            // Apply default sections: enable exactly the ones the template lists, respecting required sections
            if (Array.isArray(tpl.sections)) {
                const want = new Set(tpl.sections);
                document.querySelectorAll('#sectionsList .section-toggle').forEach(cb => {
                    const id = cb.dataset.section;
                    const shouldBeOn = want.has(id) || cb.disabled; // required stays on
                    if (cb.checked !== shouldBeOn) {
                        cb.checked = shouldBeOn;
                        cb.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });
            }

            // Re-sync Style tab selections visually
            document.querySelectorAll('#templateGridV2 .tpl-card').forEach(el => el.classList.toggle('selected', +el.dataset.i === i));
            document.querySelectorAll('#paletteGrid .palette-item').forEach((el, idx) => el.classList.toggle('selected', idx === state.currentPalette));
            document.querySelectorAll('#fontGrid .font-card').forEach((el, idx) => el.classList.toggle('selected', idx === state.currentFont));
            document.querySelectorAll('#layoutGrid .layout-card').forEach(el => el.classList.toggle('selected', el.dataset.id === state.currentLayout));
            document.querySelectorAll('#animationPills .style-pill').forEach(el => el.classList.toggle('selected', el.dataset.id === state.currentAnimation));

            saveState();
            updatePreview();
        }

        function selectPalette(i) {
            state.currentPalette = i;
            document.querySelectorAll('#paletteGrid .palette-item').forEach((el, idx) => el.classList.toggle('selected', idx === i));
            saveState();
            updatePreview();
        }

        function selectFont(i) {
            state.currentFont = i;
            document.querySelectorAll('#fontGrid .font-card').forEach((el, idx) => el.classList.toggle('selected', idx === i));
            saveState();
            updatePreview();
        }

        function selectLayout(id) {
            state.currentLayout = id;
            document.querySelectorAll('#layoutGrid .layout-card').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
            saveState();
            updatePreview();
        }

        function selectAnimation(id) {
            state.currentAnimation = id;
            document.querySelectorAll('#animationPills .style-pill').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
            saveState();
            updatePreview();
        }

        function selectLang(id) {
            state.currentLang = id;
            document.querySelectorAll('#langPills .style-pill').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
            saveState();
            updatePreview();
        }

        function toggleTheme() {
            state.isLight = !state.isLight;
            const t = document.getElementById('themeToggle');
            if (t) t.classList.toggle('on', state.isLight);
            saveState();
            updatePreview();
        }

        async function initBuilder() {
            loadState();
            restoreSectionOrder();
            initSectionsList();
            initPhotoTab();
            initContentTab();
            initStyleTab();
            hydrateInputsFromState();
            updatePreview();
            // Async: optional cloud sync; silent if Ollama/API aren't reachable
            loadOllamaModels().catch(() => {});
            try {
                const ok = await resolveAuth();
                if (ok) {
                    const loaded = await loadStateRemote();
                    if (loaded) {
                        // Re-apply after remote load
                        if (!(state.selectedSections instanceof Set)) state.selectedSections = new Set();
                        initSectionsList();
                        initStyleTab();
                        hydrateInputsFromState();
                        updatePreview();
                    }
                } else {
                    setSaveStatus('offline');
                }
            } catch (e) {
                setSaveStatus('offline');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBuilder);
        } else {
            initBuilder();
        }
    </script>
</body>
</html>
