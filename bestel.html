<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Menu & Bestellen — WebGen Gambia</title>
<meta name="theme-color" content="#00c896">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14;--bg2:#141b23;--card:#1a232d;--border:#243241;
  --teal:#00c896;--teal2:#00a87e;--gold:#f5a200;--red:#ff5a6e;
  --text:#e8edf2;--muted:#8097b0;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;padding-bottom:96px}
h1,h2,h3{font-family:'Syne',sans-serif;font-weight:700;letter-spacing:-0.02em}

/* HEADER */
.hero{
  position:relative;padding:24px 20px 20px;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 100%);
  color:#000;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,255,255,0.2),transparent 70%);
}
.hero-inner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.restaurant-name{font-size:26px;font-weight:800;margin-bottom:4px}
.restaurant-sub{font-size:13px;opacity:0.8}
.table-badge{
  background:rgba(0,0,0,0.15);color:#000;padding:6px 12px;border-radius:100px;
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  display:inline-flex;align-items:center;gap:6px;
}

/* SEARCH & CATEGORIES */
.search-bar{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.search-input{
  width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;
}
.search-input:focus{outline:none;border-color:var(--teal)}

.categories{
  display:flex;gap:8px;padding:12px 20px;overflow-x:auto;background:var(--bg2);
  scrollbar-width:none;border-bottom:1px solid var(--border);
}
.categories::-webkit-scrollbar{display:none}
.cat-pill{
  padding:7px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:100px;font-size:13px;font-weight:600;color:var(--muted);
  white-space:nowrap;cursor:pointer;transition:0.2s;
}
.cat-pill.active{background:var(--teal);color:#000;border-color:var(--teal)}

/* MENU */
.menu{padding:16px 20px}
.category-title{font-size:20px;margin:18px 0 10px;color:var(--text)}
.menu-item{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:10px;display:flex;gap:12px;cursor:pointer;transition:0.2s;
}
.menu-item:hover{border-color:var(--teal);transform:translateY(-1px)}
.menu-item:active{transform:scale(0.98)}
.item-img{
  width:72px;height:72px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 100%);
  display:flex;align-items:center;justify-content:center;font-size:32px;
}
.item-main{flex:1;min-width:0}
.item-name{font-weight:700;font-size:15px;margin-bottom:2px}
.item-desc{font-size:12px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.item-price{color:var(--teal);font-weight:700;font-size:15px}
.add-btn{
  width:32px;height:32px;border-radius:10px;background:var(--teal);color:#000;
  border:none;font-size:18px;font-weight:800;cursor:pointer;transition:0.2s;
  display:flex;align-items:center;justify-content:center;
}
.add-btn:hover{transform:scale(1.1);background:var(--teal2)}

/* CART BAR */
.cart-bar{
  position:fixed;bottom:calc(16px + env(safe-area-inset-bottom, 0px));left:16px;right:16px;z-index:100;
  background:var(--teal);color:#000;border-radius:14px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 10px 30px rgba(0,200,150,0.4);cursor:pointer;
  transform:translateY(calc(100% + 40px));transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.cart-bar.show{transform:translateY(0)}
.cart-left{display:flex;align-items:center;gap:10px;font-weight:700}
.cart-count{
  background:#000;color:var(--teal);width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;
}
.cart-total{font-family:'Syne',sans-serif;font-size:17px}

/* CART MODAL */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;
  display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);
}
.modal-bg.show{display:flex;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;
  display:flex;flex-direction:column;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Mobile/tablet polish */
@media (max-width:640px){
  .hero{padding:20px 16px 24px}
  .hero-inner{flex-direction:column;align-items:flex-start;gap:8px}
  .restaurant-name{font-size:22px}
  .table-badge{font-size:12px;padding:5px 12px}
  .search-bar{padding:12px 16px 0}
  .categories{padding:8px 16px;gap:6px}
  .cat-pill{font-size:13px;padding:7px 14px}
  .menu{padding:8px 16px 140px}
  .menu-item{padding:10px;gap:10px}
  .item-img{width:72px;height:72px;font-size:34px}
  .item-name{font-size:15px}
  .item-desc{font-size:12px}
  .item-price{font-size:14px}
  .add-btn{width:36px;height:36px;font-size:20px}
  .modal{max-width:100%;border-radius:18px 18px 0 0;padding-bottom:env(safe-area-inset-bottom, 0px)}
  .cart-bar{padding:12px 16px}
}
@media (pointer:coarse){
  button,.cat-pill,.menu-item,.add-btn,.qty-btn{min-height:44px}
  .form-input,input,textarea,select{min-height:44px;font-size:16px}
}
.modal-head{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-head h2{font-size:20px}
.modal-close{
  width:32px;height:32px;border-radius:50%;background:var(--card);color:var(--text);
  border:1px solid var(--border);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.modal-body{flex:1;overflow-y:auto;padding:12px 20px}
.cart-item{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;
}
.cart-item-main{flex:1;min-width:0}
.cart-item-name{font-weight:600;font-size:14px;margin-bottom:2px}
.cart-item-price{color:var(--teal);font-size:13px;font-weight:600}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{
  width:28px;height:28px;border-radius:8px;background:var(--bg);color:var(--text);
  border:1px solid var(--border);cursor:pointer;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.qty-btn:hover{background:var(--teal);color:#000;border-color:var(--teal)}
.qty{min-width:20px;text-align:center;font-weight:700}

.order-note{
  width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;resize:none;
  margin:8px 0;
}
.order-note:focus{outline:none;border-color:var(--teal)}

.totals{padding:12px 20px;border-top:1px solid var(--border);background:var(--bg)}
.total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:var(--muted)}
.total-row.big{font-size:18px;color:var(--text);font-weight:700;font-family:'Syne',sans-serif;padding-top:10px;margin-top:6px;border-top:1px dashed var(--border)}

.btn-order{
  width:calc(100% - 40px);margin:0 20px 20px;padding:16px;background:var(--teal);color:#000;
  border:none;border-radius:14px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  cursor:pointer;transition:0.2s;
}
.btn-order:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,200,150,0.5)}
.btn-order:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* SUCCESS */
.success{
  text-align:center;padding:40px 24px;
}
.success-icon{
  width:80px;height:80px;border-radius:50%;background:var(--teal);margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;font-size:44px;color:#000;
  animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.success h2{font-size:26px;margin-bottom:8px}
.success p{color:var(--muted);margin-bottom:4px}
.order-ref{
  display:inline-block;margin-top:16px;padding:8px 16px;background:var(--card);
  border:1px dashed var(--teal);border-radius:10px;font-family:'Syne',sans-serif;
  color:var(--teal);font-weight:700;letter-spacing:0.08em;
}
.status-track{margin-top:30px;display:flex;justify-content:space-between;gap:8px}
.status-step{
  flex:1;padding:10px 6px;background:var(--card);border-radius:10px;text-align:center;
  font-size:11px;color:var(--muted);border:1px solid var(--border);transition:0.3s;
}
.status-step.active{background:var(--teal);color:#000;border-color:var(--teal)}
.status-step-icon{font-size:20px;margin-bottom:4px;display:block}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:12px;opacity:0.4}

/* TOAST */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--teal);color:#000;padding:10px 18px;border-radius:100px;font-weight:700;
  font-size:13px;z-index:1000;transition:transform 0.3s;box-shadow:0 8px 24px rgba(0,200,150,0.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div>
      <div class="restaurant-name" id="rName">Restaurant</div>
      <div class="restaurant-sub" id="rSub">Scan • Bestel • Geniet</div>
    </div>
    <div class="table-badge" id="modeBadge">🪑 Tafel <span id="tNum">—</span></div>
  </div>
</div>

<div id="dealStrip" style="display:none;padding:16px 20px 0;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch"></div>

<div class="search-bar">
  <input type="text" class="search-input" id="search" placeholder="🔍 Zoek gerecht...">
</div>

<div class="categories" id="categories"></div>

<div class="menu" id="menu"></div>

<!-- CART BAR -->
<div class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="cart-left">
    <div class="cart-count" id="cartCount">0</div>
    <span>Bekijk bestelling</span>
  </div>
  <div class="cart-total" id="cartTotal">GMD 0</div>
</div>

<!-- OPTION PICKER MODAL -->
<div class="modal-bg" id="optModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-head">
      <h2 id="optItemName">Kies opties</h2>
      <button class="modal-close" onclick="closeOptModal()">✕</button>
    </div>
    <div class="modal-body" id="optBody"></div>
    <div style="padding:14px 20px 20px;border-top:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="color:var(--muted);font-size:13px">Totaal voor dit gerecht</span>
        <span id="optTotalLine" style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--teal)"></span>
      </div>
      <button class="btn-order" id="optConfirmBtn" onclick="confirmOptions()">Toevoegen →</button>
    </div>
  </div>
</div>

<!-- CART MODAL -->
<div class="modal-bg" id="cartModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Jouw bestelling</h2>
      <button class="modal-close" onclick="closeCart()">✕</button>
    </div>
    <div class="modal-body" id="cartItems"></div>
    <div class="totals" id="totalsBox">
      <div class="total-row"><span>Subtotaal</span><span id="subtotal">GMD 0</span></div>
      <div class="total-row big"><span>Totaal</span><span id="total">GMD 0</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
      <button class="btn-order" id="orderBtn" onclick="placeOrder()">Bestelling plaatsen →</button>
      <button class="btn-order" id="waBtn" onclick="placeOrderWhatsApp()" title="Stuur de bestelling ook via WhatsApp" style="background:#25d366;color:#fff;padding:0 16px;display:inline-flex;align-items:center;gap:6px;font-weight:700">💬 WhatsApp</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Toegevoegd</div>

<script>
// ---------- CONFIG ----------
const params = new URLSearchParams(location.search);
const restaurantId = params.get('r') || 'demo';
// Mode: explicit `?m=takeaway` OR no table param → takeaway; else dine-in with table number
const explicitMode = (params.get('m') || params.get('mode') || '').toLowerCase();
const hasTable = params.has('t');
const mode = explicitMode === 'takeaway' ? 'takeaway' : (hasTable ? 'dine-in' : 'takeaway');
const tableNum = mode === 'dine-in' ? (params.get('t') || '1') : '';
const storeKey = 'wg_menu_' + restaurantId;
const ordersKey = 'wg_orders_' + restaurantId;
const dealsKey = 'wg_deals_' + restaurantId;
const channel = new BroadcastChannel('wg_orders_' + restaurantId);

// Load active deals
let deals = [];
try { deals = JSON.parse(localStorage.getItem(dealsKey) || '[]') || []; } catch(e) { deals = []; }
function isDealActiveNow(d){
  if (!d.active) return false;
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  if (d.startDate && today < d.startDate) return false;
  if (d.endDate && today > d.endDate) return false;
  if (Array.isArray(d.days) && d.days.length && !d.days.includes(now.getDay())) return false;
  return true;
}
function activeDealForItem(itemId){
  return deals.find(d => isDealActiveNow(d) && (!d.items || !d.items.length || d.items.includes(itemId)));
}
function effectivePrice(item){
  const d = activeDealForItem(item.id);
  if (!d) return { price: item.price, dealId: null };
  if (d.type === 'fixed') return { price: d.value, dealId: d.id, originalPrice: item.price, dealLabel: 'Deal' };
  if (d.type === 'discount') return { price: Math.round(item.price * (100 - d.value) / 100), dealId: d.id, originalPrice: item.price, dealLabel: '-'+d.value+'%' };
  return { price: item.price, dealId: null };
}

// ---------- DEMO MENU (fallback) ----------
const DEMO_MENU = {
  name: 'Demo Restaurant',
  subtitle: 'Gambian Kitchen & Grill',
  currency: 'GMD',
  items: [
    {id:'a1',cat:'Voorgerecht',name:'Pepper Soup',desc:'Spicy visbouillon met groenten',price:150,emoji:'🍲'},
    {id:'a2',cat:'Voorgerecht',name:'Akara',desc:'Gebakken bonen-ballen met chili saus',price:100,emoji:'🥟'},
    {id:'b1',cat:'Hoofdgerecht',name:'Benachin',desc:'Traditionele rijst met vlees of vis',price:350,emoji:'🍛'},
    {id:'b2',cat:'Hoofdgerecht',name:'Domoda',desc:'Pinda-stew met rijst',price:300,emoji:'🥘'},
    {id:'b3',cat:'Hoofdgerecht',name:'Yassa Chicken',desc:'Kip met ui en citroen marinade',price:400,emoji:'🍗'},
    {id:'b4',cat:'Hoofdgerecht',name:'Grilled Fish',desc:'Gegrilde verse zeevis',price:450,emoji:'🐟'},
    {id:'c1',cat:'Bijgerecht',name:'Jollof Rice',desc:'Tomaat-rijst specialty',price:120,emoji:'🍚'},
    {id:'c2',cat:'Bijgerecht',name:'Plantain',desc:'Gebakken weegbree',price:80,emoji:'🍌'},
    {id:'d1',cat:'Drank',name:'Wonjo Juice',desc:'Verfrissende hibiscus drank',price:60,emoji:'🧃'},
    {id:'d2',cat:'Drank',name:'Attaya Tea',desc:'Traditionele munt-thee',price:50,emoji:'🫖'},
    {id:'d3',cat:'Drank',name:'JulBrew',desc:'Lokaal bier 330ml',price:100,emoji:'🍺'},
    {id:'e1',cat:'Dessert',name:'Thiakry',desc:'Zoete couscous met yoghurt',price:120,emoji:'🍮'},
  ]
};

// Load menu (from restaurant settings or demo)
let menu;
try {
  const stored = JSON.parse(localStorage.getItem(storeKey) || 'null');
  menu = stored || DEMO_MENU;
} catch(e) { menu = DEMO_MENU; }

// Cart is now an array of line-items to support options (same base item with
// different choices = different lines). Each entry: {lineId, itemId, qty, options, notes}
const cart = [];
let activeCat = 'Alles';
let optPending = null; // { item, lineId? (if editing existing) }

// ---------- RENDER ----------
document.getElementById('rName').textContent = menu.name || 'Restaurant';
document.getElementById('rSub').textContent = menu.subtitle || 'Menu';
if (mode === 'takeaway') {
  document.getElementById('modeBadge').innerHTML = '🛍️ Afhalen';
  document.title = (menu.name || 'Menu') + ' — Afhalen';
} else {
  document.getElementById('tNum').textContent = tableNum;
  document.title = (menu.name || 'Menu') + ' — Tafel ' + tableNum;
}

const CATEGORY_ORDER_BESTEL = ['Ontbijt','Voorgerecht','Hoofdgerecht','Bijgerecht','Menu','Drank','Dessert'];
const CATEGORY_EMOJI_BESTEL = { 'Ontbijt':'🍳','Voorgerecht':'🥗','Hoofdgerecht':'🍽️','Bijgerecht':'🍚','Drank':'🥤','Dessert':'🍮','Menu':'📋' };
function catOrderIdxBestel(cat){ const i = CATEGORY_ORDER_BESTEL.indexOf(cat); return i === -1 ? 99 : i; }

function renderCategories(){
  const uniqueCats = [...new Set(menu.items.map(i => i.cat))].sort((a,b)=>catOrderIdxBestel(a)-catOrderIdxBestel(b));
  const cats = ['Alles', ...uniqueCats];
  const box = document.getElementById('categories');
  box.innerHTML = cats.map(c => {
    const emo = c === 'Alles' ? '' : (CATEGORY_EMOJI_BESTEL[c]||'');
    return `<div class="cat-pill ${c===activeCat?'active':''}" onclick="selectCat('${c}')">${emo?emo+' ':''}${c}</div>`;
  }).join('');
  renderDealStrip();
}

function renderDealStrip(){
  const strip = document.getElementById('dealStrip');
  if (!strip) return;
  const active = deals.filter(isDealActiveNow);
  if (!active.length){ strip.style.display = 'none'; strip.innerHTML = ''; return; }
  strip.style.display = 'flex';
  strip.style.gap = '10px';
  strip.innerHTML = active.map(d => {
    const label = d.type === 'fixed' ? `${menu.currency||'GMD'} ${d.value}` : `-${d.value}%`;
    return `<div style="flex-shrink:0;background:linear-gradient(135deg,#f5a200,#e0820b);color:#000;border-radius:12px;padding:12px 16px;min-width:200px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(245,162,0,0.3)">
      <div style="font-size:28px;line-height:1">${d.emoji||'🎯'}</div>
      <div><div style="font-weight:800;font-size:14px;line-height:1.2">${escapeHtml(d.name)}</div><div style="font-weight:700;font-size:13px;opacity:0.8">${label}</div></div>
    </div>`;
  }).join('');
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function selectCat(c){ activeCat = c; renderCategories(); renderMenu(); }

function renderMenu(){
  const q = document.getElementById('search').value.toLowerCase();
  let items = menu.items;
  if (activeCat !== 'Alles') items = items.filter(i => i.cat === activeCat);
  if (q) items = items.filter(i => (i.name+' '+i.desc).toLowerCase().includes(q));

  const box = document.getElementById('menu');
  if (!items.length) {
    box.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Geen gerechten gevonden</p></div>';
    return;
  }

  // Group by cat → subcat → items
  const byCat = new Map();
  items.forEach(i => {
    if (!byCat.has(i.cat)) byCat.set(i.cat, new Map());
    const sub = i.subcat || '';
    if (!byCat.get(i.cat).has(sub)) byCat.get(i.cat).set(sub, []);
    byCat.get(i.cat).get(sub).push(i);
  });
  const cats = [...byCat.keys()].sort((a,b)=>catOrderIdxBestel(a)-catOrderIdxBestel(b));

  const renderItem = (it) => {
    const ep = effectivePrice(it);
    const priceHtml = ep.dealId
      ? `<div class="item-price" style="display:inline-flex;align-items:center;gap:8px"><span style="text-decoration:line-through;color:var(--muted);font-weight:400">${menu.currency||'GMD'} ${ep.originalPrice}</span><span style="color:var(--gold)">${menu.currency||'GMD'} ${ep.price}</span><span style="background:var(--gold);color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${ep.dealLabel}</span></div>`
      : `<div class="item-price">${menu.currency||'GMD'} ${it.price}</div>`;
    const img = it.photo
      ? `<div class="item-img" style="background:url('${it.photo}') center/cover;border-radius:10px"></div>`
      : `<div class="item-img">${it.emoji||'🍽️'}</div>`;
    const optTag = it.options && it.options.length ? `<span style="font-size:10px;color:var(--teal);margin-left:6px;padding:1px 6px;background:rgba(0,200,150,0.1);border-radius:4px;font-weight:600">✨ keuzes</span>` : '';
    return `
      <div class="menu-item ${ep.dealId?'on-deal':''}" onclick="addItem('${it.id}')" ${ep.dealId?'style="border:1px solid rgba(245,162,0,0.3)"':''}>
        ${img}
        <div class="item-main">
          <div class="item-name">${it.name}${optTag}</div>
          <div class="item-desc">${it.desc||''}</div>
          <div class="item-foot">
            ${priceHtml}
            <button class="add-btn" onclick="event.stopPropagation();addItem('${it.id}')">+</button>
          </div>
        </div>
      </div>`;
  };

  box.innerHTML = cats.map(cat => {
    const subs = byCat.get(cat);
    const subKeys = [...subs.keys()].sort((a,b)=>{ if (!a) return -1; if (!b) return 1; return a.localeCompare(b); });
    const emo = CATEGORY_EMOJI_BESTEL[cat] || '';
    let html = `<div style="display:flex;align-items:baseline;gap:10px;margin:24px 0 8px;padding-bottom:8px;border-bottom:2px solid var(--teal,#00c896)"><h3 class="category-title" style="margin:0;display:flex;align-items:center;gap:8px">${emo?`<span style="font-size:22px">${emo}</span>`:''}${cat}</h3></div>`;
    subKeys.forEach(sub => {
      if (sub) {
        html += `<div style="font-size:11px;font-weight:700;color:var(--teal,#00c896);letter-spacing:.14em;text-transform:uppercase;margin:14px 0 6px 2px">— ${escapeHtml(sub)}</div>`;
      }
      html += subs.get(sub).map(renderItem).join('');
    });
    return html;
  }).join('');
}
document.getElementById('search').addEventListener('input', renderMenu);

// ---------- CART ----------
function cartSameLine(itemId, options){
  // Find a line with same item + same option choices so qty merges instead of duplicates
  const key = JSON.stringify(options||{});
  return cart.find(l => l.itemId === itemId && JSON.stringify(l.options||{}) === key);
}

function addItem(id){
  const it = menu.items.find(i => i.id === id);
  if (!it) return;
  if (it.options && it.options.length){
    // Needs picker
    openOptModal(it);
  } else {
    const existing = cartSameLine(id, {});
    if (existing) existing.qty++;
    else cart.push({ lineId:'L'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), itemId:id, qty:1, options:{} });
    updateCart();
    toast('✓ Toegevoegd');
  }
}

function linePrice(line){
  const it = menu.items.find(i => i.id === line.itemId);
  if (!it) return 0;
  const ep = effectivePrice(it);
  let base = ep.price;
  // Add option adjustments
  if (it.options && line.options){
    it.options.forEach(g => {
      const chosen = line.options[g.id];
      if (!chosen) return;
      const labels = Array.isArray(chosen) ? chosen : [chosen];
      labels.forEach(lbl => {
        const c = g.choices.find(c => c.label === lbl);
        if (c && c.priceAdjust) base += c.priceAdjust;
      });
    });
  }
  return base;
}

function lineOptionsLabel(line){
  const it = menu.items.find(i => i.id === line.itemId);
  if (!it || !it.options) return '';
  const parts = [];
  it.options.forEach(g => {
    const chosen = line.options?.[g.id];
    if (!chosen) return;
    const labels = Array.isArray(chosen) ? chosen : [chosen];
    if (labels.length) parts.push(labels.join(', '));
  });
  return parts.join(' · ');
}

function removeItem(lineId){
  const i = cart.findIndex(l => l.lineId === lineId);
  if (i < 0) return;
  if (cart[i].qty > 1) cart[i].qty--;
  else cart.splice(i, 1);
  updateCart();
  renderCart();
}
function incItem(lineId){
  const l = cart.find(x => x.lineId === lineId);
  if (l){ l.qty++; updateCart(); renderCart(); }
}

function cartTotal(){
  let total = 0, count = 0;
  cart.forEach(l => { total += linePrice(l) * l.qty; count += l.qty; });
  return {total, count};
}
function updateCart(){
  const {total, count} = cartTotal();
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = (menu.currency||'GMD')+' '+total;
  document.getElementById('cartBar').classList.toggle('show', count>0);
}
function openCart(){
  document.getElementById('cartModal').classList.add('show');
  renderCart();
}
function closeCart(){ document.getElementById('cartModal').classList.remove('show'); }

// ---------- OPTION PICKER ----------
function openOptModal(item){
  optPending = { item, selected:{} };
  // Pre-select first choice if required
  item.options.forEach(g => {
    if (g.required && g.type === 'single' && g.choices.length) optPending.selected[g.id] = g.choices[0].label;
    if (g.type === 'multi') optPending.selected[g.id] = [];
  });
  document.getElementById('optItemName').textContent = `${item.emoji||'🍽️'} ${item.name}`;
  renderOptBody();
  document.getElementById('optModal').classList.add('show');
}
function closeOptModal(){
  document.getElementById('optModal').classList.remove('show');
  optPending = null;
}
function renderOptBody(){
  if (!optPending) return;
  const it = optPending.item;
  const ep = effectivePrice(it);
  const cur = menu.currency || 'GMD';
  let html = `<div style="padding:0 20px 12px;color:var(--muted);font-size:13px">Basisprijs <b style="color:var(--text)">${cur} ${ep.price}</b></div>`;
  it.options.forEach(g => {
    html += `<div style="padding:14px 20px;border-top:1px solid var(--border)">
      <div style="font-weight:700;color:#fff;margin-bottom:2px">${escapeHtml(g.name)}${g.required?' <span style="color:#fca5a5;font-weight:500;font-size:11px">(verplicht)</span>':''}</div>
      <div style="color:var(--muted);font-size:11px;margin-bottom:10px">${g.type==='single'?'Kies één':'Kies 0 of meer'}</div>
      ${g.choices.map(c => {
        const selected = g.type === 'single' ? (optPending.selected[g.id] === c.label) : (Array.isArray(optPending.selected[g.id]) && optPending.selected[g.id].includes(c.label));
        const pa = c.priceAdjust ? ` <span style="color:var(--teal)">+${cur} ${c.priceAdjust}</span>` : '';
        return `<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid ${selected?'var(--teal)':'var(--border)'};border-radius:10px;margin-bottom:6px;cursor:pointer;background:${selected?'rgba(0,200,150,0.08)':'transparent'};transition:all 0.15s">
          <input type="${g.type==='single'?'radio':'checkbox'}" name="opt-${g.id}" value="${escapeHtml(c.label)}" ${selected?'checked':''} onchange="pickOption('${g.id}','${escapeHtml(c.label).replace(/'/g,"\\'")}','${g.type}',this.checked)" style="accent-color:var(--teal);width:18px;height:18px">
          <span style="flex:1">${escapeHtml(c.label)}${pa}</span>
        </label>`;
      }).join('')}
    </div>`;
  });
  document.getElementById('optBody').innerHTML = html;
  recomputeOptTotal();
}
function pickOption(gid, label, type, checked){
  if (!optPending) return;
  if (type === 'single') optPending.selected[gid] = label;
  else {
    const arr = Array.isArray(optPending.selected[gid]) ? optPending.selected[gid] : [];
    if (checked) { if (!arr.includes(label)) arr.push(label); }
    else { const i = arr.indexOf(label); if (i>=0) arr.splice(i,1); }
    optPending.selected[gid] = arr;
  }
  renderOptBody();
}
function recomputeOptTotal(){
  if (!optPending) return;
  const fakeLine = { itemId: optPending.item.id, options: optPending.selected };
  const price = linePrice(fakeLine);
  document.getElementById('optTotalLine').textContent = (menu.currency||'GMD') + ' ' + price;
  // Disable confirm if required unselected
  const missing = optPending.item.options.some(g => g.required && !optPending.selected[g.id]);
  document.getElementById('optConfirmBtn').disabled = !!missing;
  document.getElementById('optConfirmBtn').textContent = missing ? 'Maak verplichte keuze…' : 'Toevoegen →';
}
function confirmOptions(){
  if (!optPending) return;
  const missing = optPending.item.options.some(g => g.required && !optPending.selected[g.id]);
  if (missing){ toast('Maak eerst de verplichte keuze'); return; }
  const existing = cartSameLine(optPending.item.id, optPending.selected);
  if (existing) existing.qty++;
  else cart.push({
    lineId: 'L'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    itemId: optPending.item.id,
    qty: 1,
    options: optPending.selected
  });
  closeOptModal();
  updateCart();
  toast('✓ Toegevoegd');
}

function renderCart(){
  const box = document.getElementById('cartItems');
  if (!cart.length){
    box.innerHTML = '<div class="empty"><div class="empty-icon">🛒</div><p>Nog geen gerechten</p></div>';
    document.getElementById('orderBtn').disabled = true;
    document.getElementById('subtotal').textContent = (menu.currency||'GMD')+' 0';
    document.getElementById('total').textContent = (menu.currency||'GMD')+' 0';
    return;
  }
  document.getElementById('orderBtn').disabled = false;
  const c = menu.currency||'GMD';
  box.innerHTML = cart.map(line => {
    const it = menu.items.find(i => i.id === line.itemId);
    if (!it) return '';
    const ep = effectivePrice(it);
    const dealTag = ep.dealId ? `<span style="background:var(--gold,#f5a200);color:#000;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px">${ep.dealLabel}</span>` : '';
    const optLbl = lineOptionsLabel(line);
    const optHtml = optLbl ? `<div style="font-size:11px;color:var(--teal);margin-top:3px">✓ ${escapeHtml(optLbl)}</div>` : '';
    return `
      <div class="cart-item">
        <div style="font-size:28px">${it.emoji||'🍽️'}</div>
        <div class="cart-item-main">
          <div class="cart-item-name">${it.name}${dealTag}</div>
          ${optHtml}
          <div class="cart-item-price">${c} ${linePrice(line) * line.qty}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="removeItem('${line.lineId}')">−</button>
          <span class="qty">${line.qty}</span>
          <button class="qty-btn" onclick="incItem('${line.lineId}')">+</button>
        </div>
      </div>
    `;
  }).join('') + (mode === 'takeaway' ? `
    <div style="background:rgba(0,200,150,0.08);border:1px solid rgba(0,200,150,0.25);border-radius:10px;padding:12px 14px;margin-top:14px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:10px">🛍️ Afhaalgegevens</div>
      <input class="order-note" id="pickupName" style="margin-bottom:8px" placeholder="Jouw naam *" value="${(sessionStorage.getItem('bestel-name')||'')}">
      <input class="order-note" id="pickupPhone" type="tel" style="margin-bottom:8px" placeholder="Telefoon (bv. +220 3XX XXXX) *" value="${(sessionStorage.getItem('bestel-phone')||'')}">
      <input class="order-note" id="pickupTime" type="time" style="margin-bottom:0" placeholder="Ophaaltijd">
    </div>` : '') + `
    <textarea class="order-note" id="note" rows="2" placeholder="Opmerking voor de keuken (optioneel) — bijv. niet te pittig"></textarea>
  `;
  const {total} = cartTotal();
  document.getElementById('subtotal').textContent = c+' '+total;
  document.getElementById('total').textContent = c+' '+total;
}

// ---------- ORDER ----------
function placeOrder(){
  if (!cart.length) return;

  // Collect takeaway customer info if in takeaway mode
  let customer = null;
  if (mode === 'takeaway') {
    const name = (document.getElementById('pickupName')||{}).value?.trim() || '';
    const phone = (document.getElementById('pickupPhone')||{}).value?.trim() || '';
    const pickupTime = (document.getElementById('pickupTime')||{}).value || '';
    if (!name || !phone) {
      toast('Vul naam en telefoon in voor afhaal');
      return;
    }
    sessionStorage.setItem('bestel-name', name);
    sessionStorage.setItem('bestel-phone', phone);
    customer = { name, phone, pickupTime };
  }

  const items = cart.map(line => {
    const it = menu.items.find(i => i.id === line.itemId);
    const ep = effectivePrice(it);
    const optLbl = lineOptionsLabel(line);
    return {
      id: line.itemId,
      name: it.name,
      price: linePrice(line),
      qty: line.qty,
      emoji: it.emoji,
      ...(optLbl ? { optionsLabel: optLbl } : {}),
      ...(line.options && Object.keys(line.options).length ? { options: line.options } : {}),
      ...(ep.dealId ? { dealId: ep.dealId, originalPrice: ep.originalPrice } : {})
    };
  });
  const {total} = cartTotal();
  const order = {
    id: 'ORD-' + Date.now().toString(36).toUpperCase().slice(-6),
    restaurantId,
    type: mode, // 'dine-in' | 'takeaway'
    table: mode === 'dine-in' ? tableNum : '',
    customer, // null for dine-in
    items,
    total,
    currency: menu.currency||'GMD',
    note: (document.getElementById('note')||{}).value || '',
    status: 'new', // new → preparing → ready → served → paid
    createdAt: Date.now()
  };

  const orders = JSON.parse(localStorage.getItem(ordersKey) || '[]');
  orders.unshift(order);
  localStorage.setItem(ordersKey, JSON.stringify(orders));
  channel.postMessage({type:'new_order', order});

  // Show confirmation
  cart.length = 0;
  updateCart();
  showOrderSuccess(order);
}

// ---------- ORDER via WhatsApp ----------
function placeOrderWhatsApp(){
  const waRaw = (menu.whatsapp || menu.phone || '').replace(/\D/g,'');
  if (!waRaw){
    toast('Dit restaurant heeft geen WhatsApp-nummer ingesteld');
    return;
  }
  if (!cart.length) return;

  // Same validation as placeOrder for takeaway
  let customer = null;
  if (mode === 'takeaway') {
    const name = (document.getElementById('pickupName')||{}).value?.trim() || '';
    const phone = (document.getElementById('pickupPhone')||{}).value?.trim() || '';
    const pickupTime = (document.getElementById('pickupTime')||{}).value || '';
    if (!name || !phone) { toast('Vul naam en telefoon in voor afhaal'); return; }
    sessionStorage.setItem('bestel-name', name);
    sessionStorage.setItem('bestel-phone', phone);
    customer = { name, phone, pickupTime };
  }

  const items = cart.map(line => {
    const it = menu.items.find(i => i.id === line.itemId);
    const ep = effectivePrice(it);
    const optLbl = lineOptionsLabel(line);
    return {
      id: line.itemId,
      name: it.name,
      price: linePrice(line),
      qty: line.qty,
      emoji: it.emoji,
      ...(optLbl ? { optionsLabel: optLbl } : {}),
      ...(line.options && Object.keys(line.options).length ? { options: line.options } : {}),
      ...(ep.dealId ? { dealId: ep.dealId, originalPrice: ep.originalPrice } : {})
    };
  });
  const {total} = cartTotal();
  const note = (document.getElementById('note')||{}).value || '';
  const order = {
    id: 'ORD-' + Date.now().toString(36).toUpperCase().slice(-6),
    restaurantId,
    type: mode,
    table: mode === 'dine-in' ? tableNum : '',
    customer,
    items,
    total,
    currency: menu.currency||'GMD',
    note,
    status: 'new',
    channel: 'whatsapp',
    createdAt: Date.now()
  };

  // Save + broadcast so kassa sees it
  const orders = JSON.parse(localStorage.getItem(ordersKey) || '[]');
  orders.unshift(order);
  localStorage.setItem(ordersKey, JSON.stringify(orders));
  channel.postMessage({type:'new_order', order});

  // Build WhatsApp message
  const c = menu.currency||'GMD';
  const lines = [];
  lines.push(`Hallo ${menu.name}, ik wil graag bestellen:`);
  lines.push('');
  lines.push(mode === 'takeaway'
    ? `🛍️ Afhalen ${customer.pickupTime?'om '+customer.pickupTime:''} · ${customer.name}${customer.phone?' · '+customer.phone:''}`
    : `🪑 Tafel ${tableNum}`);
  lines.push('');
  items.forEach(it => {
    lines.push(`• ${it.qty}× ${it.emoji||''} ${it.name} — ${c} ${it.price*it.qty}`);
    if (it.optionsLabel) lines.push(`   ↳ ${it.optionsLabel}`);
  });
  lines.push('');
  lines.push(`Totaal: ${c} ${total}`);
  if (note) { lines.push(''); lines.push(`Opmerking: ${note}`); }
  lines.push('');
  lines.push(`Ref: ${order.id}`);
  const waUrl = `https://wa.me/${waRaw}?text=${encodeURIComponent(lines.join('\n'))}`;

  cart.length = 0;
  updateCart();
  window.open(waUrl, '_blank');
  showOrderSuccess(order);
}

function showOrderSuccess(order){
  const isTakeaway = order.type === 'takeaway';
  const deliveryLine = isTakeaway
    ? `<p>Afhalen${order.customer?.pickupTime ? ` om <strong>${order.customer.pickupTime}</strong>` : ''}${order.customer?.name ? ` voor <strong>${order.customer.name}</strong>` : ''}.</p><p style="font-size:13px;color:var(--muted)">Zodra je bestelling klaar is ontvang je bericht op <strong>${order.customer?.phone || ''}</strong>.</p>`
    : `<p>We brengen het zo snel mogelijk naar tafel <strong>${order.table}</strong>.</p>`;
  const lastStep = isTakeaway
    ? `<div class="status-step"><span class="status-step-icon">🛍️</span>Klaar voor afhaal</div>`
    : `<div class="status-step"><span class="status-step-icon">🍽️</span>Geserveerd</div>`;
  const modal = document.getElementById('cartModal');
  modal.querySelector('.modal').innerHTML = `
    <div class="modal-head">
      <h2>${isTakeaway ? '🛍️ Afhaal bevestigd' : 'Bestelling geplaatst'}</h2>
      <button class="modal-close" onclick="location.reload()">✕</button>
    </div>
    <div class="modal-body">
      <div class="success">
        <div class="success-icon">✓</div>
        <h2>Bedankt!</h2>
        <p>Je bestelling is doorgestuurd naar de keuken.</p>
        ${deliveryLine}
        <div class="order-ref">${order.id}</div>
        <div class="status-track" id="statusTrack">
          <div class="status-step active"><span class="status-step-icon">📥</span>Nieuw</div>
          <div class="status-step"><span class="status-step-icon">👨‍🍳</span>Bereiden</div>
          <div class="status-step"><span class="status-step-icon">🔔</span>Klaar</div>
          ${lastStep}
        </div>
        <p style="margin-top:24px;font-size:13px">Totaal: <strong style="color:var(--teal)">${order.currency} ${order.total}</strong></p>
        <button class="btn-order" style="margin-top:24px;width:100%" onclick="location.reload()">Nog iets bestellen</button>
      </div>
    </div>
  `;
  // Listen for status updates from kassa
  const statusMap = {'new':0,'preparing':1,'ready':2,'served':3,'paid':3};
  channel.onmessage = (e) => {
    if (e.data.type === 'status_update' && e.data.orderId === order.id){
      const track = document.getElementById('statusTrack');
      if (!track) return;
      const steps = track.querySelectorAll('.status-step');
      const idx = statusMap[e.data.status] ?? 0;
      steps.forEach((s,i) => s.classList.toggle('active', i<=idx));
    }
  };
}

// ---------- TOAST ----------
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

// ---------- INIT ----------
renderCategories();
renderMenu();
updateCart();

// Close modal on background click
document.getElementById('cartModal').addEventListener('click', (e) => {
  if (e.target.id === 'cartModal') closeCart();
});
